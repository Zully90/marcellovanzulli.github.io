<!-- Language Switcher Button -->
<button type="button" class="lang-switch" id="lang-toggle" aria-label="Switch Language"
  title="Switch language / Cambia lingua">
  <i class="fas fa-globe"></i>
  <span id="lang-label">IT</span>
</button>

<script>
  /* Language Toggle — switches between EN and IT */
  (function () {
    var STORAGE_KEY = 'preferred-lang';
    var html = document.documentElement;
    var btn = document.getElementById('lang-toggle');
    var label = document.getElementById('lang-label');

    function getLang() {
      return localStorage.getItem(STORAGE_KEY) || 'en';
    }

    function setLang(lang) {
      localStorage.setItem(STORAGE_KEY, lang);
      if (lang === 'it') {
        html.classList.add('lang-it');
        html.setAttribute('lang', 'it');
        label.textContent = 'EN';
      } else {
        html.classList.remove('lang-it');
        html.setAttribute('lang', 'en');
        label.textContent = 'IT';
      }
    }

    /* Initialize on load */
    setLang(getLang());

    btn.addEventListener('click', function () {
      var current = getLang();
      setLang(current === 'en' ? 'it' : 'en');
    });
  })();
</script>
