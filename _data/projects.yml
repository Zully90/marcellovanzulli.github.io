      dell'utente, fornire output grafici, salvare progetti e generare report.
      Soluzione cloud end-to-end costruita da zero con elaborazione real-time.
  tags:
    - Cloud
    - Real-time
    - Aquaphotomics

- title: FT-IR Spectrum Alignment Software
  icon: fas fa-chart-line
  period: "2023"
  client: Private (Freelance)
  description:
    en: >-
      Developed a Windows tool for finding alignment coefficients between
      FT-IR spectra with master-slave relationships. Required creative
      solutions due to constraints: direct instrument import, no heavy
      computation, offline usage requirement.
    it: >-
      Sviluppo di uno strumento Windows per trovare coefficienti di
      allineamento tra spettri FT-IR con relazione master-slave. Richieste
      soluzioni creative per vincoli: importazione diretta dallo strumento,
      nessun calcolo pesante, utilizzo offline obbligatorio.
  tags:
    - FT-IR
    - Desktop App
    - Offline

- title: QualiControl
  icon: fas fa-clipboard-check
  period: "2020 - 2023"
  client: Qualitade srl
  description:
    en: >-
      Fully integrated solution for professional quality control with a portable
