- title: R&D Chemometrician — NIRLAB
  icon: fas fa-microscope
  period: "2023 - 2025"
  client: NIRLAB AG
  description:
    en: >-
      Developing and updating chemometric models for NIR spectra across
      multiple sectors: narcotics and cannabis, agriculture, aquaculture,
      agri-food, and plastic materials recycling. Assessing feasibility of NIR
      applications and evaluating new spectrophotometers for the company portfolio.
    it: >-
      Sviluppo e aggiornamento di modelli chemiometrici per spettri NIR in
      diversi settori: narcotici e cannabis, agricoltura, acquacoltura,
      agroalimentare e riciclaggio di materiali plastici. Valutazione della
      fattibilità di applicazioni NIR e di nuovi spettrofotometri per il
      portfolio aziendale.
  tags:
    - NIR
    - Chemometrics
    - Multi-sector

- title: AquaControl
  icon: fas fa-water
  period: "2023"
  client: CREA (Freelance)
  description:
    en: >-
      Developed a cloud platform capable of collecting NIR spectra in real-time,
      processing them according to user-specific aquaphotomics requirements,
      providing graphical output, saving projects, and generating reports.
      End-to-end cloud solution built from scratch with real-time processing.
    it: >-
      Sviluppo di una piattaforma cloud in grado di raccogliere spettri NIR
