      models. Enables production monitoring with multivariate control charts
      and analysis results.
    it: >-
      Soluzione completamente integrata per il controllo qualità professionale
      con uno strumento NIR portatile. Progettazione dell'architettura della
      piattaforma (input UI/UX), definizione dei requisiti di contenuto
      (grafici, algoritmi) e sviluppo di modelli NIR predittivi. Consente il
      monitoraggio della produzione con carte di controllo multivariate e
      risultati di analisi.
  tags:
    - NIR
    - Quality Control
    - Platform Design

