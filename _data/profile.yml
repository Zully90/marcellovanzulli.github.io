bio:
  en: >-
    I am a Lead Chemometrician and Data Scientist with over 8 years of experience
    in developing predictive models for NIR, Raman, and other spectroscopic techniques.
    I lead a team of specialists at NIRLAB AG in Lausanne, where I combine my expertise
    in analytical chemistry with advanced machine learning methods. My work spans the
    full lifecycle — from client consultation and feasibility analysis to model development,
    deployment with Docker/Kubernetes, and ongoing support. I thrive at the intersection
    of chemistry, data science, and business communication.
  it: >-
    Sono un Lead Chemometrician e Data Scientist con oltre 8 anni di esperienza
    nello sviluppo di modelli predittivi per NIR, Raman e altre tecniche spettroscopiche.
    Guido un team di specialisti presso NIRLAB AG a Losanna, dove combino la mia competenza
    in chimica analitica con metodi avanzati di machine learning. Il mio lavoro copre l'intero
    ciclo di vita — dalla consulenza al cliente e analisi di fattibilità, allo sviluppo dei modelli,
    al deployment con Docker/Kubernetes, al supporto continuo. Opero con naturalezza
    all'intersezione tra chimica, data science e comunicazione aziendale.

